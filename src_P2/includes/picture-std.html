<picture>
  <source
    type="image/webp"
    media="(max-width: 767px)"
    srcset="
      ./img/{{src}}?as=webp&width=400&quality=60 400w,
      ./img/{{src}}?as=webp&width=600&quality=60 600w
    "
    sizes="100vw"
  />

  <source
    type="image/webp"
    media="(min-width: 768px)"
    srcset="
      ./img/{{src}}?as=webp&width=800&quality=60   800w,
      ./img/{{src}}?as=webp&width=1200&quality=60 1200w,
      ./img/{{src}}?as=webp&width=1600&quality=60 1600w
    "
    sizes="540px"
  />

  <img
    src="./img/{{src}}?width={{width}}"
    alt="{{alt}}"
    lang="{{lang}}"
    class="{{class}}"
    loading="{{typeof loading !== 'undefined' ? loading : 'lazy'}}"
    width="{{width}}"
    height="{{height}}"
  />
</picture>
